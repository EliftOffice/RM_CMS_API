<!DOCTYPE html>
<html>
<head>
    <title>Team Lead Management</title>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- API Config -->
    <script src="../assets/js/api-config.js"></script>
    <script src="../assets/js/CreatingTeamLeads.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #eef2f7;
            padding: 30px;
        }

        .container {
            max-width: 600px;
            margin: auto;
        }

        h2 {
            text-align: center;
            color: #0B3D3B;
        }

        .card {
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            font-weight: 600;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #0B3D3B;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

            button:hover {
                background: #145c59;
            }

        .success {
            color: green;
        }

        .error {
            color: red;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>Create Team Lead</h2>

        <div class="card">

            <div class="form-group">
                <label>First Name *</label>
                <input type="text" id="first_name">
            </div>

            <div class="form-group">
                <label>Last Name *</label>
                <input type="text" id="last_name">
            </div>

            <div class="form-group">
                <label>Email </label>
                <input type="email" id="email">
            </div>

            <div class="form-group">
                <label>Phone *</label>
                <input type="text" id="phone">
            </div>

            <div class="form-group">
                <label>Role</label>
                <select id="role_type">
                    <option value="TeamLead" selected>TeamLead</option>
                    <option value="Pastor">Pastor</option>
                    <option value="Admin">Admin</option>
                </select>
            </div>

            <div class="form-group">
                <label>Max Volunteers</label>
                <input type="number" id="max_volunteers" value="10">
            </div>

            <button id="saveBtn">Save</button>

            <p id="message"></p>

        </div>

    </div>
