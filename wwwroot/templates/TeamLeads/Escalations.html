<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Escalation Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script src="../assets/js/api-config.js"></script>
    <script src="../assets/js/escalations.js"></script>

    <style>
        body {
            background: #f5f5f5;
            padding: 30px;
        }

        .card {
            padding: 20px;
            border-radius: 10px;
        }

        .badge-emergency {
            background: red;
        }

        .badge-urgent {
            background: orange;
        }

        .badge-standard {
            background: green;
        }

        textarea, select {
            width: 100%;
            margin-top: 10px;
        }

        button {
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="card">

            <h3>Escalation Details</h3>

            <p><strong>ID:</strong> <span id="escId"></span></p>
            <p><strong>Person:</strong> <span id="personId"></span></p>
            <p><strong>Reason:</strong> <span id="reason"></span></p>
            <p><strong>Tier:</strong> <span id="tier"></span></p>
            <p><strong>Status:</strong> <span id="status"></span></p>
            <p><strong>Description:</strong> <span id="desc"></span></p>

            <hr />

            <h5>Actions</h5>

            <button id="ackBtn" class="btn btn-warning">Acknowledge</button>

            <hr />

            <h5>Resolve / Refer / Close</h5>

            <select id="statusSelect">
                <option value="">Select Status</option>
                <option value="Resolved">Resolved</option>
                <option value="Referred Out">Referred Out</option>
                <option value="Closed">Closed</option>
            </select>

            <select id="outcomeSelect">
                <option value="">Select Outcome</option>
                <option>Counseling Referral</option>
                <option>Benevolence Provided</option>
                <option>Emergency Services Called</option>
                <option>Connected to Resource</option>
                <option>Other</option>
            </select>

            <input type="text" id="resource" placeholder="Resource Connected" />

            <textarea id="notes" placeholder="Resolution Notes"></textarea>

            <label>
                <input type="checkbox" id="followUp" /> Follow-up Scheduled
            </label>

            <button id="resolveBtn" class="btn btn-success">Submit</button>

            <div id="message" class="mt-3"></div>

        </div>

    </div>

</body>
</html>
