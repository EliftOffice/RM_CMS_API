<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Team Lead Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="../assets/js/api-config.js"></script>
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/teamlead.js"></script>
</head>
<body>
<div class="container mt-4">
    <div class="row">
        <div class="col-12 d-flex justify-content-between align-items-center mb-3">
            <h3>Team Lead Dashboard</h3>
            <div>
                <label>Team Lead ID:</label>
                <input id="teamLeadId" class="form-control d-inline-block ms-2" style="width:140px" />
                <button id="loadMetrics" class="btn btn-primary ms-2">Load</button>
            </div>
        </div>
    </div>

    <div id="alerts"></div>

    <div class="row">
        <div class="col-md-8">
            <div class="card mb-3">
                <div class="card-body">
                    <h5>Team Performance</h5>
                    <div id="teamPerformance"></div>
                </div>
            </div>

            <div class="card mb-3">
                <div class="card-body">
                    <h5>Volunteers Metrics</h5>
                    <table class="table table-sm" id="volunteersTable">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Capacity</th>
                                <th>This Week</th>
                                <th>Last Week</th>
                                <th>Trend</th>
                                <th>Flag</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card mb-3">
                <div class="card-body">
                    <h5>Attention Needed</h5>
                    <ul id="attentionList" class="list-group list-group-flush"></ul>
                </div>
            </div>

            <div class="card mb-3">
                <div class="card-body">
                    <h5>Upcoming Check-ins</h5>
                    <ul id="checkinsList" class="list-group list-group-flush"></ul>
                </div>
            </div>
        </div>
    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
