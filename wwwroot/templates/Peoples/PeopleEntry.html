<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RM CMS Visitor Portal </title>
    <link rel="icon" href="../assets/Images/favicon.ico">
    <link rel="icon" type="image/png" href="../assets/Images/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- API Configuration -->
    <script src="../assets/js/api-config.js"></script>
    <script src="../assets/js/utils.js"></script>
    <style>
        /* ── CSS Variables ── */
        :root {
            --primary: #085c40;
            --primary-hover: #064d35;
            --primary-light: #e6f4ef;
            --primary-dark: #053d2b;
            --white: #ffffff;
            --bg: #ffffff;
            --surface: #f9fafb;
            --border: #e5e7eb;
            --text: #111827;
            --muted: #6b7280;
            --danger: #ef4444;
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --t: 0.18s ease;
            --radius: 12px;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

            body::before {
                content: '';
                display: block;
                height: 3px;
                background: var(--primary);
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                z-index: 999;
            }

        .site-navbar {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
            position: sticky;
            top: 3px;
            z-index: 100;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .navbar-logo {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            object-fit: cover;
            border: 2px solid var(--primary-light);
        }

        .navbar-logo-placeholder {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            background: var(--primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            border: 2px solid var(--primary-light);
        }

        .navbar-name {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.02em;
        }

            .navbar-name span {
                color: var(--primary);
            }

        .navbar-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .navbar-badge {
            font-size: 0.72rem;
            font-weight: 700;
            padding: 3px 10px;
            background: var(--primary-light);
            color: var(--primary-dark);
            border-radius: 999px;
            letter-spacing: 0.04em;
        }

        .page-wrap {
            max-width: 480px; /* narrower since single column */
            margin: 0 auto;
            padding: 40px 20px 60px;
        }

        .page-eyebrow {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            color: var(--primary);
            margin-bottom: 6px;
        }

        .page-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.04em;
            margin-bottom: 4px;
        }

        .page-sub {
            font-size: 0.9rem;
            color: var(--muted);
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .page-divider {
            height: 1px;
            background: var(--border);
            margin-bottom: 28px;
        }

        .form-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 18px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .form-card-header {
            padding: 16px 22px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-card-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .form-card-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text);
            margin: 0;
            letter-spacing: -0.01em;
        }

        .form-card-body {
            padding: 22px;
        }

        /* ── CHANGE 1: Single column — no form-row-2 grid ── */
        .form-group {
            margin-bottom: 16px;
        }

            .form-group:last-child {
                margin-bottom: 0;
            }

        .form-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 7px;
            letter-spacing: 0.01em;
        }

        .required-star {
            color: var(--danger);
            margin-left: 2px;
        }

        /* Textbox width same as before — full width of card */
        .form-control,
        .form-select {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            font-size: 0.925rem;
            font-family: var(--font);
            color: var(--text);
            background: var(--surface);
            outline: none;
            transition: border-color var(--t), box-shadow var(--t), background var(--t);
            appearance: none;
        }

            .form-control::placeholder {
                color: #9ca3af;
            }

            .form-control:focus,
            .form-select:focus {
                border-color: var(--primary);
                background: var(--white);
                box-shadow: 0 0 0 3px rgba(8, 92, 64, 0.12);
            }

        textarea.form-control {
            resize: vertical;
            min-height: 80px;
        }

        /* ── CHANGE 3: Only Submit button, centered ── */
        .btn-row-actions {
            display: flex;
            justify-content: center;
            margin-top: 4px;
        }

        .btn-submit {
            padding: 12px 40px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-size: 0.95rem;
            font-weight: 700;
            font-family: var(--font);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background var(--t), box-shadow var(--t), transform var(--t);
            letter-spacing: -0.01em;
        }

            .btn-submit:hover {
                background: var(--primary-hover);
                box-shadow: 0 6px 20px rgba(8, 92, 64, 0.28);
            }

            .btn-submit:active {
                transform: scale(0.98);
            }

            .btn-submit:disabled {
                background: #d1d5db;
                color: #9ca3af;
                cursor: not-allowed;
                box-shadow: none;
                transform: none;
            }

        #responseMessage {
            margin-top: 16px;
            padding: 13px 16px;
            border-radius: var(--radius);
            font-size: 0.9rem;
            font-weight: 500;
            border: 1px solid transparent;
            text-align: center;
        }

            #responseMessage.text-success {
                background: #f0fdf4;
                border-color: #86efac;
                color: #166534;
            }

            #responseMessage.text-danger {
                background: #fef2f2;
                border-color: #fca5a5;
                color: #991b1b;
            }

        .no_display {
            display: none !important;
        }

        @media (max-width: 560px) {
            .page-title {
                font-size: 1.5rem;
            }

            .page-wrap {
                padding: 24px 16px 48px;
            }

            .form-card-body {
                padding: 16px;
            }

            .site-navbar {
                padding: 0 16px;
            }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="site-navbar">
        <a class="navbar-brand" href="#">
            <img src="../assets/Images/logo.jpeg" alt="Logo" class="navbar-logo"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
            <div class="navbar-logo-placeholder" style="display:none;">✝</div>
            <span class="navbar-name">RM <span>CMS</span></span>
        </a>
        <div class="navbar-right">
            <span class="navbar-badge">Visitor Portal</span>
        </div>
    </nav>

    <div class="page-wrap">

        <p class="page-eyebrow">Connection Card</p>
        <h1 class="page-title">Welcome!</h1>

        <div class="page-divider"></div>

        <form id="visitorForm">

            <!-- Personal Information -->
            <div class="form-card">
                <div class="form-card-header">
                    <div class="form-card-icon">👤</div>
                    <h2 class="form-card-title">Personal Information</h2>
                </div>
                <div class="form-card-body">

                    <div class="form-group">
                        <label class="form-label">First Name <span class="required-star">*</span></label>
                        <input type="text" class="form-control" id="first_name" placeholder="First name" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Last Name <span class="required-star">*</span></label>
                        <input type="text" class="form-control" id="last_name" placeholder="Last name" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Phone <span class="required-star">*</span></label>
                        <input type="tel" class="form-control mobile-input" id="phone" placeholder="Your phone number" maxlength="10">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" placeholder="Your email address">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Age</label>
                        <select class="form-select" id="age_range">
                            <option value="">Select...</option>
                            <option value="18-25">18-25</option>
                            <option value="26-35">26-35</option>
                            <option value="36-45">36-45</option>
                            <option value="46-55">46-55</option>
                            <option value="56+">56+</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Household Type</label>
                        <select class="form-select" id="household_type">
                            <option value="">Select...</option>
                            <option value="Single">Single</option>
                            <option value="Married">Married</option>
                            <option value="Family_with_Kids">Family with Kids</option>
                            <option value="Empty_Nest">Empty Nest</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="ddlLocationType" class="form-label">Location Type</label>

                        <select class="form-select" id="ddlLocationType" name="ddlLocationType">
                            <option value="Local" selected="selected">Local</option>
                            <option value="Non-Local">Non-Local</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Address</label>
                        <textarea class="form-control" id="address" rows="2" placeholder="Enter Address..."></textarea>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Connection Source</label>
                        <select class="form-select" id="connection_source">
                            <option value="">Select...</option>
                            <option selected="selected" value="Friend_Family_Invite">Friend/Family Invite</option>
                            <option value="Event">Event</option>
                            <option value="Social_Media">Social Media</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <!-- Ref Section -->
                    <div class="ref_div">
                        <div class="form-group">
                            <label class="form-label">Ref: Name</label>
                            <input type="text" class="form-control" id="ref_name" placeholder="Ref: Name">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Ref: Phone</label>
                            <input type="tel" class="form-control mobile-input" id="ref_phone" placeholder="Ref: phone number" maxlength="10">
                        </div>
                    </div>

                </div>
            </div>

            <!-- Prayer -->
            <div class="form-card">
                <div class="form-card-header">
                    <div class="form-card-icon">🙏</div>
                    <h2 class="form-card-title">Prayer &amp; Needs</h2>
                </div>
                <div class="form-card-body">
                    <div class="form-group">
                        <label class="form-label">Prayer Requests</label>
                        <textarea class="form-control" id="prayer_requests" rows="2" placeholder="Share any prayer requests..."></textarea>
                    </div>
                </div>
            </div>

            <div class="btn-row-actions">
                <button type="submit" class="btn-submit" id="submitBtn">
                    Submit
                </button>
            </div>

        </form>

        <div id="responseMessage" style="display:none;"></div>

    </div>

    <script>
        $(document).ready(function () {

            // Toggle Ref Section
            $('#connection_source').on('change', function () {
                const isRef = $(this).val() === 'Friend_Family_Invite';
                $('.ref_div').toggle(isRef);

                // Clear ref fields when hidden
                if (!isRef) {
                    $('#ref_name, #ref_phone').val('');
                }
            });

            $('#visitorForm').on('submit', function (e) {
                e.preventDefault();

                const phone = $('#phone').val();
                const connection = $('#connection_source').val();
                const refName = $('#ref_name').val();
                const refPhone = $('#ref_phone').val();

                // ✅ Main phone validation (required + 10 digits)
                if (!phone || !/^\d{10}$/.test(phone)) {
                    showError('Enter valid 10-digit phone number');
                    return;
                }

                // ✅ Ref validation (only for Friend/Family)
                if (connection === 'Friend_Family_Invite') {

                    if (!refName) {
                        showError('Reference name is required');
                        return;
                    }

                    if (!refPhone || !/^\d{10}$/.test(refPhone)) {
                        showError('Enter valid 10-digit reference phone number');
                        return;
                    }
                }

                const formData = {
                    firstName: $('#first_name').val(),
                    lastName: $('#last_name').val(),
                    phone: phone,
                    email: $('#email').val(),
                    ageRange: $('#age_range').val(),
                    address: $('#address').val(),
                    connectionSource: connection,
                    refName: refName,
                    refPhone: refPhone,
                    prayerRequests: $('#prayer_requests').val(),
                    householdType: $('#household_type').val(),
                    LocationType: $('#ddlLocationType').val() || 'Local'
                };

                const btn = $('#submitBtn');
                btn.prop('disabled', true).text('⏳ Submitting...');

                $.ajax({
                    url: API_BASE_URL + "/people",
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(formData),

                    success: function () {
                        showSuccess('✓ Success! Welcome to our community.');
                        $('#visitorForm')[0].reset();

                        const isRef = $('#connection_source').val() === 'Friend_Family_Invite';
                        $('.ref_div').toggle(isRef);
                        $('#ref_name, #ref_phone').val('');
                    },

                    error: function (xhr) {
                        showError(xhr.responseJSON?.message || 'Something went wrong');
                    },

                    complete: function () {
                        btn.prop('disabled', false).text('Submit');
                    }
                });

            });

            // Helper functions
            function showError(msg) {
                $('#responseMessage')
                    .removeClass('text-success')
                    .addClass('text-danger')
                    .text(msg)
                    .show();
            }

            function showSuccess(msg) {
                $('#responseMessage')
                    .removeClass('text-danger')
                    .addClass('text-success')
                    .text(msg)
                    .show();
            }

        });
    </script>

</body>


</html>
