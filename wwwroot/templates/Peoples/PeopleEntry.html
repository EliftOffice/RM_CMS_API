<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RM CMS Visitor Portal </title>
    <link rel="icon" href="../assets/Images/favicon.ico">
    <link rel="icon" type="image/png" href="../assets/Images/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- API Configuration -->
    <script src="../assets/js/api-config.js"></script>
    <script src="../assets/js/utils.js"></script>
    <style>
        /* ── CSS Variables ── */
        :root {
            --primary: #085c40;
            --primary-hover: #064d35;
            --primary-light: #e6f4ef;
            --primary-dark: #053d2b;
            --white: #ffffff;
            --bg: #ffffff;
            --surface: #f9fafb;
            --border: #e5e7eb;
            --text: #111827;
            --muted: #6b7280;
            --danger: #ef4444;
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --t: 0.18s ease;
            --radius: 12px;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

            body::before {
                content: '';
                display: block;
                height: 3px;
                background: var(--primary);
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                z-index: 999;
            }

        .site-navbar {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
            position: sticky;
            top: 3px;
            z-index: 100;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .navbar-logo {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            object-fit: cover;
            border: 2px solid var(--primary-light);
        }

        .navbar-logo-placeholder {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            background: var(--primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            border: 2px solid var(--primary-light);
        }

        .navbar-name {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.02em;
        }

            .navbar-name span {
                color: var(--primary);
            }

        .navbar-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .navbar-badge {
            font-size: 0.72rem;
            font-weight: 700;
            padding: 3px 10px;
            background: var(--primary-light);
            color: var(--primary-dark);
            border-radius: 999px;
            letter-spacing: 0.04em;
        }

        .page-wrap {
            max-width: 480px; /* narrower since single column */
            margin: 0 auto;
            padding: 40px 20px 60px;
        }

        .page-eyebrow {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            color: var(--primary);
            margin-bottom: 6px;
        }

        .page-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.04em;
            margin-bottom: 4px;
        }

        .page-sub {
            font-size: 0.9rem;
            color: var(--muted);
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .page-divider {
            height: 1px;
            background: var(--border);
            margin-bottom: 28px;
        }

        .form-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 18px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .form-card-header {
            padding: 16px 22px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-card-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .form-card-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text);
            margin: 0;
            letter-spacing: -0.01em;
        }

        .form-card-body {
            padding: 22px;
        }

        /* ── CHANGE 1: Single column — no form-row-2 grid ── */
        .form-group {
            margin-bottom: 16px;
        }

            .form-group:last-child {
                margin-bottom: 0;
            }

        .form-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 7px;
            letter-spacing: 0.01em;
        }

        .required-star {
            color: var(--danger);
            margin-left: 2px;
        }

        /* Textbox width same as before — full width of card */
        .form-control,
        .form-select {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            font-size: 0.925rem;
            font-family: var(--font);
            color: var(--text);
            background: var(--surface);
            outline: none;
            transition: border-color var(--t), box-shadow var(--t), background var(--t);
            appearance: none;
        }

            .form-control::placeholder {
                color: #9ca3af;
            }

            .form-control:focus,
            .form-select:focus {
                border-color: var(--primary);
                background: var(--white);
                box-shadow: 0 0 0 3px rgba(8, 92, 64, 0.12);
            }

        textarea.form-control {
            resize: vertical;
            min-height: 80px;
        }

        /* ── CHANGE 3: Only Submit button, centered ── */
        .btn-row-actions {
            display: flex;
            justify-content: center;
            margin-top: 4px;
        }

        .btn-submit {
            padding: 12px 40px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-size: 0.95rem;
            font-weight: 700;
            font-family: var(--font);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background var(--t), box-shadow var(--t), transform var(--t);
            letter-spacing: -0.01em;
        }

            .btn-submit:hover {
                background: var(--primary-hover);
                box-shadow: 0 6px 20px rgba(8, 92, 64, 0.28);
            }

            .btn-submit:active {
                transform: scale(0.98);
            }

            .btn-submit:disabled {
                background: #d1d5db;
                color: #9ca3af;
                cursor: not-allowed;
                box-shadow: none;
                transform: none;
            }

        #responseMessage {
            margin-top: 16px;
            padding: 13px 16px;
            border-radius: var(--radius);
            font-size: 0.9rem;
            font-weight: 500;
            border: 1px solid transparent;
            text-align: center;
        }

            #responseMessage.text-success {
                background: #f0fdf4;
                border-color: #86efac;
                color: #166534;
            }

            #responseMessage.text-danger {
                background: #fef2f2;
                border-color: #fca5a5;
                color: #991b1b;
            }

        .no_display {
            display: none !important;
        }

        @media (max-width: 560px) {
            .page-title {
                font-size: 1.5rem;
            }

            .page-wrap {
                padding: 24px 16px 48px;
            }

            .form-card-body {
                padding: 16px;
            }

            .site-navbar {
                padding: 0 16px;
            }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="site-navbar">
        <a class="navbar-brand" href="#">
            <img src="../assets/Images/logo.jpeg" alt="Logo" class="navbar-logo"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
            <div class="navbar-logo-placeholder" style="display:none;">✝</div>
            <span class="navbar-name">RM <span>CMS</span></span>
        </a>
        <div class="navbar-right">
            <span class="navbar-badge">Visitor Portal</span>
        </div>
    </nav>

    <div class="page-wrap">

        <p class="page-eyebrow">Connection Card</p>
        <h1 class="page-title">Welcome!</h1>
        
        <div class="page-divider"></div>

        <form id="visitorForm">

            <!-- Personal Information Card -->
            <div class="form-card">
                <div class="form-card-header">
                    <div class="form-card-icon">👤</div>
                    <h2 class="form-card-title">Personal Information</h2>
                </div>
                <div class="form-card-body">

                    <!-- CHANGE 1: Single column — each field full width, same textbox length -->
                    <div class="form-group">
                        <label class="form-label" for="first_name">First Name <span class="required-star">*</span></label>
                        <input type="text" class="form-control" id="first_name" placeholder="First name" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="last_name">Last Name <span class="required-star">*</span></label>
                        <input type="text" class="form-control" id="last_name" placeholder="Last name" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="phone">Phone <span class="required-star">*</span></label>
                        <input type="tel" class="form-control mobile-input" id="phone" placeholder="Your phone number" inputmode="tel" maxlength="10">
                    </div>

                    <!-- CHANGE: Email hidden -->
                    <div class="no_display">
                        <label class="form-label" for="email">Email</label>
                        <input type="email" class="form-control" id="email" placeholder="Your email address">
                    </div>

                    <!-- Hidden fields — logic preserved -->
                    <div class="no_display">
                        <select class="form-select" id="age_range">
                            <option value="">Select...</option>
                            <option value="18-25">18-25</option>
                            <option value="26-35">26-35</option>
                            <option value="36-45">36-45</option>
                            <option value="46-55">46-55</option>
                            <option value="56+">56+</option>
                        </select>
                    </div>
                    <div class="no_display">
                        <select class="form-select" id="household_type">
                            <option value="">Select...</option>
                            <option value="Single">Single</option>
                            <option value="Married">Married</option>
                            <option value="Family">Family with Children</option>
                        </select>
                    </div>
                    <div class="no_display"><input type="text" id="zip_code"></div>
                    <div class="no_display"><input type="text" id="campus"></div>
                    <div class="no_display">
                        <select id="visit_type">
                            <option value="First-Time Visitor">First-Time Visitor</option>
                            <option value="Returning Visitor">Returning Visitor</option>
                        </select>
                    </div>
                    <div class="no_display"><input type="text" id="connection_source"></div>

                </div>
            </div>

            <!-- Interests Card — hidden -->
            <div class="form-card no_display">
                <div class="form-card-header">
                    <div class="form-card-icon">❤️</div>
                    <h2 class="form-card-title">Interested In</h2>
                </div>
                <div class="form-card-body">
                    <div class="form-group" style="margin-bottom:0;">
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
                            <label style="display:flex;align-items:center;gap:10px;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius);cursor:pointer;">
                                <input class="form-check-input" type="checkbox" value="Membership" id="interest_membership">
                                <span>Membership</span>
                            </label>
                            <label style="display:flex;align-items:center;gap:10px;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius);cursor:pointer;">
                                <input class="form-check-input" type="checkbox" value="Volunteering" id="interest_volunteering">
                                <span>Volunteering</span>
                            </label>
                            <label style="display:flex;align-items:center;gap:10px;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius);cursor:pointer;">
                                <input class="form-check-input" type="checkbox" value="Small Groups" id="interest_groups">
                                <span>Small Groups</span>
                            </label>
                            <label style="display:flex;align-items:center;gap:10px;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius);cursor:pointer;">
                                <input class="form-check-input" type="checkbox" value="Counseling" id="Counseling">
                                <span>Counseling</span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- CHANGE 2: Prayer & Needs — hidden -->
            <div class="form-card no_display">
                <div class="form-card-header">
                    <div class="form-card-icon">🙏</div>
                    <h2 class="form-card-title">Prayer &amp; Needs</h2>
                </div>
                <div class="form-card-body">
                    <div class="form-group">
                        <label class="form-label" for="prayer_requests">Prayer Requests</label>
                        <textarea class="form-control" id="prayer_requests" rows="2" placeholder="Share any prayer requests..."></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="specific_needs">Specific Needs</label>
                        <textarea class="form-control" id="specific_needs" rows="2" placeholder="Any specific needs we can help with?"></textarea>
                    </div>
                </div>
            </div>

            <!-- CHANGE 3: Only Submit button, centered -->
            <div class="btn-row-actions">
                <button type="submit" class="btn-submit" id="submitBtn">
                    Submit
                </button>
            </div>

        </form>

        <div id="responseMessage" style="display:none;"></div>

    </div>

    <!-- ORIGINAL JQUERY LOGIC — UNTOUCHED -->
    <script>
        $(document).ready(function () {
            $('#visitorForm').on('submit', function (e) {
                e.preventDefault();

                // Collect "Interested In" values
                let interests = [];
                if ($('#interest_membership').is(':checked')) interests.push('Membership');
                if ($('#interest_volunteering').is(':checked')) interests.push('Volunteering');
                if ($('#interest_groups').is(':checked')) interests.push('Small Groups');
                if ($('#Counseling').is(':checked')) interests.push('Counseling');

                const formData = {
                    first_name: $('#first_name').val(),
                    last_name: $('#last_name').val(),
                    email: $('#email').val(),
                    phone: $('#phone').val(),
                    age_range: $('#age_range').val(),
                    household_type: $('#household_type').val(),
                    zip_code: $('#zip_code').val(),
                    campus: $('#campus').val(),
                    visit_type: $('#visit_type').val(),
                    connection_source: $('#connection_source').val(),
                    interested_in: interests.join(', '),
                    prayer_requests: $('#prayer_requests').val(),
                    specific_needs: $('#specific_needs').val(),
                    follow_up_status: 'NEW',
                    follow_up_priority: determinePriority()
                };

                function determinePriority() {
                    if (interests.includes('Counseling')) return 'Urgent';
                    if ($('#specific_needs').val() || $('#prayer_requests').val()) return 'High';
                    return 'Normal';
                }

                // 🔹 Validate phone number (10 digits only)
                if (formData.phone && !isValidMobileNumber(formData.phone)) {
                    $('#responseMessage')
                        .removeClass('text-success')
                        .addClass('text-danger')
                        .text('Phone number must be exactly 10 digits')
                        .show();
                    return;
                }

                const btn = document.getElementById('submitBtn');
                btn.disabled = true;
                btn.innerHTML = '⏳ Submitting...';

                $.ajax({
                    url: API_BASE_URL + "/people",
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(formData),
                    success: function (response) {
                        $('#responseMessage')
                            .removeClass('text-danger')
                            .addClass('text-success')
                            .text('✓ Success! Welcome to our community.')
                            .show();
                        $('#visitorForm')[0].reset();
                        btn.disabled = false;
                        btn.innerHTML = 'Submit';
                    },
                    error: function (xhr) {
                        $('#responseMessage')
                            .removeClass('text-success')
                            .addClass('text-danger')
                            .text('Error: ' + (xhr.responseJSON ? xhr.responseJSON.message : 'Something went wrong'))
                            .show();
                        btn.disabled = false;
                        btn.innerHTML = 'Submit';
                    }
                });
            });
        });
    </script>

</body>
</html>
