<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pastor Dashboard - RM CMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="../assets/js/api-config.js"></script>
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/pastor.js"></script>

    <style>
        :root {
            --primary: #085c40;
            --primary-hover: #064d35;
            --primary-light: #e6f4ef;
            --primary-dark: #053d2b;
            --white: #ffffff;
            --bg: #ffffff;
            --surface: #f9fafb;
            --border: #e5e7eb;
            --text: #111827;
            --muted: #6b7280;
            --danger: #ef4444;
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --t: 0.18s ease;
            --radius: 12px;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

            body::before {
                content: '';
                display: block;
                height: 3px;
                background: var(--primary);
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                z-index: 999;
            }

        /* ── Header (same as Assignments.html) ── */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 24px;
            background: var(--white);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 3px;
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-logo {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
            border: 2px solid var(--primary-light);
        }

            .header-logo img {
                width: 30px;
                height: 30px;
                object-fit: contain;
            }

        .h-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
            margin: 0;
            line-height: 1.2;
        }

        .h-sub {
            font-size: 11px;
            color: #9ca3af;
            margin: 0;
            line-height: 1.2;
        }

        /* Refresh controls */
        .refresh-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

            .refresh-group label {
                font-size: 12px;
                font-weight: 600;
                color: var(--muted);
                margin: 0;
                white-space: nowrap;
            }

        #refreshInterval {
            width: 72px;
            padding: 6px 10px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 13px;
            font-family: var(--font);
            color: var(--text);
            background: var(--surface);
            outline: none;
            transition: border-color var(--t), box-shadow var(--t);
        }

            #refreshInterval:focus {
                border-color: var(--primary);
                background: var(--white);
                box-shadow: 0 0 0 3px rgba(8,92,64,0.12);
            }

        #refreshNow {
            padding: 6px 14px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            font-family: var(--font);
            cursor: pointer;
            transition: background var(--t), box-shadow var(--t);
            white-space: nowrap;
        }

            #refreshNow:hover {
                background: var(--primary-hover);
                box-shadow: 0 4px 12px rgba(8,92,64,0.22);
            }

            #refreshNow:active {
                transform: scale(0.98);
            }

        /* ── Page Body ── */
        .page-body {
            padding: 28px 20px 60px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ── Alerts ── */
        #alerts {
            margin-bottom: 4px;
        }

            #alerts .alert {
                border-radius: var(--radius);
                font-size: 0.875rem;
                margin-bottom: 12px;
            }

        /* ── Cards ── */
        .card {
            background: var(--white) !important;
            border: 1px solid var(--border) !important;
            border-radius: 16px !important;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04) !important;
            margin-bottom: 16px;
            overflow: hidden;
        }

            .card.p-3 {
                padding: 0 !important;
            }

        /* card strip header */
        .card-strip {
            padding: 13px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--white);
        }

        .card-strip-icon {
            width: 28px;
            height: 28px;
            border-radius: 7px;
            background: var(--primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            flex-shrink: 0;
        }

        .card-strip-title {
            font-size: 0.875rem;
            font-weight: 700;
            color: var(--text);
            margin: 0;
        }

        .card-inner {
            padding: 18px 20px;
        }

        /* h5 fallback (original markup) */
        .card h5 {
            font-size: 0.875rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        /* ── System Health ── */
        #systemHealth > div {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.875rem;
            color: var(--muted);
        }

            #systemHealth > div:last-child {
                border-bottom: none;
                padding-bottom: 0;
            }

        #systemHealth strong {
            font-weight: 700;
            color: var(--text);
        }

        #systemHealth .mt-2 {
            margin-top: 10px !important;
            padding-top: 10px;
            border-top: 2px solid var(--border);
            font-weight: 700;
        }

            #systemHealth .mt-2 strong {
                color: var(--primary);
            }

        /* ── KPIs ── */
        #kpis {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

            #kpis .kpi {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 8px 12px;
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 8px;
                font-size: 0.82rem;
                color: var(--muted);
            }

        /* ── Pipeline ── */
        #pipeline {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 8px;
        }

            #pipeline > div {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 10px;
                padding: 10px 14px;
                font-size: 0.82rem;
                color: var(--muted);
            }

            #pipeline strong {
                display: block;
                font-size: 1.2rem;
                font-weight: 700;
                color: var(--primary);
                letter-spacing: -0.03em;
                margin-top: 2px;
            }

        /* Loading text */
        .text-muted {
            color: var(--muted) !important;
        }

        .text-danger {
            color: var(--danger) !important;
        }

        /* ── Table ── */
        .table {
            margin-bottom: 0;
        }

            .table thead th {
                font-size: 0.72rem;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.06em;
                color: var(--muted);
                background: var(--surface);
                border-bottom: 1px solid var(--border);
                padding: 10px 14px;
            }

            .table tbody td {
                font-size: 0.875rem;
                color: var(--text);
                border-bottom: 1px solid var(--border);
                padding: 11px 14px;
                vertical-align: middle;
            }

            .table tbody tr:last-child td {
                border-bottom: none;
            }

            .table tbody tr:hover td {
                background: var(--surface);
            }

        /* Bootstrap overrides */
        .btn-primary, .btn-sm.btn-primary {
            background: var(--primary) !important;
            border-color: var(--primary) !important;
        }

            .btn-primary:hover {
                background: var(--primary-hover) !important;
                border-color: var(--primary-hover) !important;
            }

        @media (max-width: 768px) {
            .page-header {
                flex-wrap: wrap;
                gap: 10px;
                padding: 10px 16px;
            }

            .refresh-group {
                flex-wrap: wrap;
            }

            .page-body {
                padding: 20px 12px 48px;
            }

            #pipeline {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- ── Header (same as Assignments.html) ── -->
    <div class="page-header">
        <div class="header-left">
            <div class="header-logo">
                <img src="../assets/Images/logo.jpeg" alt="RM"
                     onerror="this.style.display='none';this.parentElement.textContent='R'">
            </div>
            <div>
                <div class="h-title">Pastor Dashboard</div>
                <div class="h-sub">System Overview</div>
            </div>
        </div>
        <div class="refresh-group">
            <label for="refreshInterval">Auto refresh (sec):</label>
            <input id="refreshInterval" type="number" value="0" min="0" />
            <button id="refreshNow" class="btn btn-sm btn-primary ms-2">Refresh</button>
        </div>
    </div>

    <!-- ── Page Body ── -->
    <div class="page-body">

        <div id="alerts"></div>

        <div class="row g-3">

            <!-- Left: System Health + KPIs -->
            <div class="col-md-4">

                <div class="card">
                    <div class="card-strip">
                        <div class="card-strip-icon">💚</div>
                        <h3 class="card-strip-title">System Health</h3>
                    </div>
                    <div class="card-inner">
                        <div id="systemHealth">
                            <p class="text-muted" style="font-size:0.875rem;">Loading...</p>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-strip">
                        <div class="card-strip-icon">📈</div>
                        <h3 class="card-strip-title">Key KPIs</h3>
                    </div>
                    <div class="card-inner">
                        <div id="kpis">
                            <p class="text-muted" style="font-size:0.875rem;">Loading...</p>
                        </div>
                    </div>
                </div>

            </div>

            <!-- Right: Team Lead Performance + Pipeline -->
            <div class="col-md-8">

                <div class="card mb-3">
                    <div class="card-strip">
                        <div class="card-strip-icon">👥</div>
                        <h3 class="card-strip-title">Team Lead Performance</h3>
                    </div>
                    <div style="overflow-x:auto;">
                        <table class="table table-sm" id="teamLeadTable">
                            <thead>
                                <tr>
                                    <th>Team Lead</th>
                                    <th>Team Size</th>
                                    <th>Completion Rate</th>
                                    <th>vNPS</th>
                                    <th>Retention</th>
                                    <th>Flag</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>

                <div class="card">
                    <div class="card-strip">
                        <div class="card-strip-icon">🔽</div>
                        <h3 class="card-strip-title">Pipeline Health</h3>
                    </div>
                    <div class="card-inner">
                        <div id="pipeline">
                            <p class="text-muted" style="font-size:0.875rem;">Loading...</p>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
