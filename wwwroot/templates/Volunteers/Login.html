<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Login - RM CMS</title>

    <link rel="icon" href="../../templates/assets/Images/favicon.ico">
    <link rel="icon" type="image/png" href="../../templates/assets/Images/logo.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script src="../../templates/assets/js/api-config.js"></script>

    <script src="../../templates/assets/js/toast.js"></script>

    <script src="../../templates/assets/js/VolunteerLogin.js"></script>

    <style>

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f5f7f6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            margin: 0;
        }

        .vl-brand {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 1.5rem;
        }

        .vl-logo {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: #e6f4ef;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

            .vl-logo img {
                width: 34px;
                height: 34px;
                object-fit: contain;
            }

        .vl-brand-name {
            font-size: 1rem;
            font-weight: 700;
            color: #111827;
        }

        .vl-card {
            background: #fff;
            border-radius: 14px;
            border: 1px solid #e5e7eb;
            padding: 32px 28px;
            width: 100%;
            max-width: 400px;
        }

        .vl-eyebrow {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #085c40;
            margin-bottom: 6px;
        }

        .vl-heading {
            font-size: 1.5rem;
            font-weight: 700;
            color: #111827;
            margin-bottom: 6px;
        }

        .vl-sub {
            font-size: 0.83rem;
            color: #6b7280;
            margin-bottom: 20px;
        }

        .vl-divider {
            height: 1px;
            background: #e5e7eb;
            margin-bottom: 20px;
        }

        .vl-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
            display: block;
        }

        .vl-input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #111827;
            outline: none;
            margin-bottom: 20px;
            background: #fff;
        }

            .vl-input:focus {
                border-color: #085c40;
                box-shadow: 0 0 0 3px rgba(8,92,64,0.08);
            }

        .vl-btn-wrap {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }

        .vl-btn {
            padding: 10px 36px;
            background: #085c40;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
        }

            .vl-btn:hover {
                background: #064d35;
            }

        .otp-wrap {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .otp-input {
            width: 55px;
            height: 55px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 10px;
            border: 1px solid #d1d5db;
        }

            .otp-input:focus {
                border-color: #085c40;
                box-shadow: 0 0 0 3px rgba(8,92,64,0.08);
                outline: none;
            }

        #otpSection {
            display: none;
        }
    </style>

</head>

<body>

    <div class="vl-brand">

        <div class="vl-logo">

            <img src="../assets/Images/logo.jpeg"
                 alt="RM CMS Logo"
                 onerror="this.style.display='none';this.parentElement.textContent='RM'">

        </div>

        <span class="vl-brand-name" style="color:#085c40;">
            RM CMS
        </span>

    </div>

    <div class="vl-card">

        <p class="vl-eyebrow">
            Volunteer Portal
        </p>

        <h1 class="vl-heading">
            Welcome Back
        </h1>

        <p class="vl-sub">
            Enter your registered mobile number to continue.
        </p>

        <div class="vl-divider"></div>

        <form id="loginForm">

            <!-- MOBILE SECTION -->
            <div id="mobileSection">

                <label class="vl-label" for="mobile">
                    Mobile Number
                </label>

                <input type="text"
                       id="mobile"
                       class="vl-input"
                       placeholder="e.g. 9876543210"
                       maxlength="10">

                <div class="vl-btn-wrap">

                    <button type="submit"
                            class="vl-btn">

                        Send OTP

                    </button>

                </div>

            </div>

            <!-- OTP SECTION -->
            <div id="otpSection">

                <label class="vl-label">
                    Enter 4 Digit OTP
                </label>

                <div class="otp-wrap">

                    <input type="text"
                           class="otp-input"
                           maxlength="1">

                    <input type="text"
                           class="otp-input"
                           maxlength="1">

                    <input type="text"
                           class="otp-input"
                           maxlength="1">

                    <input type="text"
                           class="otp-input"
                           maxlength="1">

                </div>

                <div class="vl-btn-wrap">

                    <button type="button"
                            id="verifyOtpBtn"
                            class="vl-btn">

                        Verify OTP

                    </button>

                </div>

            </div>

        </form>

    </div>

</body>
</html>
