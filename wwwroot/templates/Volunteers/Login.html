<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Login - RM CMS</title>

    <link rel="icon" href="../assets/Images/favicon.ico">
    <link rel="icon" type="image/png" href="../assets/Images/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="../assets/js/api-config.js"></script>
    <script src="../assets/js/VolunteerLogin.js"></script>

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f5f7f6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            margin: 0;
        }

        .vl-brand {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 1.5rem;
        }

        .vl-logo {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: #e6f4ef;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #085c40;
            font-size: 1.1rem;
            overflow: hidden;
        }

            .vl-logo img {
                width: 34px;
                height: 34px;
                object-fit: contain;
            }

        .vl-brand-name {
            font-size: 1rem;
            font-weight: 700;
            color: #111827;
        }

        .vl-card {
            background: #fff;
            border-radius: 14px;
            border: 1px solid #e5e7eb;
            padding: 32px 28px;
            width: 100%;
            max-width: 400px;
        }

        .vl-eyebrow {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #085c40;
            margin: 0 0 6px;
        }

        .vl-heading {
            font-size: 1.5rem;
            font-weight: 700;
            color: #111827;
            margin: 0 0 6px;
            letter-spacing: -0.03em;
        }

        .vl-sub {
            font-size: 0.83rem;
            color: #6b7280;
            margin: 0 0 20px;
        }

        .vl-divider {
            height: 1px;
            background: #e5e7eb;
            margin-bottom: 20px;
        }

        .vl-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #374151;
            margin: 0 0 6px;
            display: block;
        }

        .vl-input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #111827;
            outline: none;
            margin-bottom: 20px;
            font-family: inherit;
            background: #fff;
            transition: border-color 0.15s;
        }

            .vl-input:focus {
                border-color: #085c40;
                box-shadow: 0 0 0 3px rgba(8, 92, 64, 0.08);
            }

            .vl-input::placeholder {
                color: #9ca3af;
            }

        .vl-btn-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 18px;
        }

        .vl-btn {
            padding: 10px 36px;
            background: #085c40;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.15s;
        }

            .vl-btn:hover {
                background: #064d35;
            }

        .vl-links {
            display: flex;
            justify-content: space-between;
        }

            .vl-links a {
                font-size: 0.8rem;
                color: #085c40;
                text-decoration: none;
            }

                .vl-links a:hover {
                    text-decoration: underline;
                }

        .error {
            color: #dc2626;
            font-size: 0.82rem;
            margin-bottom: 10px;
            display: none;
        }

        .success {
            color: #085c40;
            font-size: 0.82rem;
            margin-bottom: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="vl-brand">
        <div class="vl-logo">
            <img src="../assets/Images/logo.jpeg" alt="RM CMS Logo"
                 onerror="this.style.display='none';this.parentElement.textContent='R'">
        </div>
        <span class="vl-brand-name">RM </span> <span class="vl-brand-name" style="color: #085c40" >CMS</span>
    </div>

    <div class="vl-card">
        <p class="vl-eyebrow">Volunteer Portal</p>
        <h1 class="vl-heading">Welcome back</h1>
        <p class="vl-sub">Enter your registered mobile number to sign in.</p>
        <div class="vl-divider"></div>

        <div class="error" id="errorMessage"></div>
        <div class="success" id="successMessage"></div>

        <form id="loginForm">
            <label class="vl-label" for="mobile">Mobile Number</label>
            <input type="text" id="mobile" class="vl-input" placeholder="e.g. 9876543210" maxlength="10">
            <div class="vl-btn-wrap">
                <button type="submit" class="vl-btn">Login</button>
            </div>
        </form>

        <!--<div class="vl-links">
            <a href="#" id="forgotLink">Forgot Mobile Number?</a>
            <a href="#" id="signUp">SignUp?</a>
        </div>-->
    </div>

</body>
</html>
