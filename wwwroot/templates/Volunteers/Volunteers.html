<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Volunteer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="../assets/js/api-config.js"></script>
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/volunteers.js"></script>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            padding: 30px;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px #ccc;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
        }

        button {
            background: #28a745;
            color: white;
            padding: 10px;
            border: none;
            width: 100%;
            cursor: pointer;
        }

        .message {
            margin-top: 15px;
            padding: 10px;
            display: none;
        }

        .success {
            background: #d4edda;
            color: #155724;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Create Volunteer</h2>

        <input type="text" id="firstName" placeholder="First Name" />
        <input type="text" id="lastName" placeholder="Last Name" />
        <input type="email" id="email" placeholder="Email" />
        <input type="text" id="phone" placeholder="Phone" />
        <input type="text" id="teamLead" placeholder="Team Lead ID" />

        <select id="capacityBand">
            <option value="">Select Capacity</option>
            <option value="Consistent">Consistent (4-6)</option>
            <option value="Balanced">Balanced (2-3)</option>
            <option value="Limited">Limited (1-2)</option>
        </select>

        <button id="submitBtn">Create Volunteer</button>

        <div id="message" class="message"></div>
    </div>

    

</body>
</html>
