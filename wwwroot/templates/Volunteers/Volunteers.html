<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Volunteer - RM CMS</title>
    <link rel="icon" href="../assets/Images/favicon.ico">
    <link rel="icon" type="image/png" href="../assets/Images/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="../assets/js/api-config.js"></script>
    <script src="../assets/js/utils.js"></script>

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f5f7f6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            margin: 0;
        }

        /* ── BRAND (matches File 1) ── */
        .vl-brand {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 1.5rem;
        }

        .vl-logo {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: #e6f4ef;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #085c40;
            font-size: 1.1rem;
            overflow: hidden;
        }

            .vl-logo img {
                width: 34px;
                height: 34px;
                object-fit: contain;
            }

        .vl-brand-name {
            font-size: 1rem;
            font-weight: 700;
            color: #111827;
        }

        /* ── CARD (matches File 1) ── */
        .vl-card {
            background: #fff;
            border-radius: 14px;
            border: 1px solid #e5e7eb;
            padding: 32px 28px;
            width: 100%;
            max-width: 540px; /* slightly wider to accommodate 2-col grid */
        }

        /* ── EYEBROW / HEADING / SUB (matches File 1) ── */
        .vl-eyebrow {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #085c40;
            margin: 0 0 6px;
        }

        .vl-heading {
            font-size: 1.5rem;
            font-weight: 700;
            color: #111827;
            margin: 0 0 6px;
            letter-spacing: -0.03em;
        }

        .vl-sub {
            font-size: 0.83rem;
            color: #6b7280;
            margin: 0 0 20px;
        }

        .vl-divider {
            height: 1px;
            background: #e5e7eb;
            margin-bottom: 20px;
        }

        /* ── BACK LINK ── */
        .vl-back {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #085c40;
            text-decoration: none;
            margin-bottom: 18px;
        }

            .vl-back:hover {
                text-decoration: underline;
                color: #064d35;
            }

        /* ── 2-COLUMN FORM GRID ── */
        .vl-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0 16px;
        }

            /* full-width override for fields that should span both columns */
            .vl-grid .vl-full {
                grid-column: 1 / -1;
            }

        /* ── LABEL (matches File 1) ── */
        .vl-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #374151;
            margin: 0 0 6px;
            display: block;
        }

        /* ── INPUT (matches File 1) ── */
        .vl-input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #111827;
            outline: none;
            margin-bottom: 20px;
            font-family: inherit;
            background: #fff;
            transition: border-color 0.15s;
        }

            .vl-input:focus {
                border-color: #085c40;
                box-shadow: 0 0 0 3px rgba(8, 92, 64, 0.08);
            }

            .vl-input::placeholder {
                color: #9ca3af;
            }

        /* ── MESSAGES (matches File 1 pattern) ── */
        .error {
            color: #dc2626;
            font-size: 0.82rem;
            margin-bottom: 10px;
            display: none;
        }

        .success {
            color: #085c40;
            font-size: 0.82rem;
            margin-bottom: 10px;
            display: none;
        }

        /* alert-message class used by JS */
        .alert-message {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.82rem;
            margin-bottom: 14px;
            border-left: 3px solid;
        }

        .alert-error {
            background: #fef5f5;
            border-left-color: #ef4444;
            color: #991b1b;
        }

        .alert-success {
            background: #f0fdf4;
            border-left-color: #22c55e;
            color: #166534;
        }

        /* ── BUTTON WRAP (matches File 1) ── */
        .vl-btn-wrap {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 18px;
            margin-top: 4px;
        }

        /* ── PRIMARY BUTTON (matches File 1 exactly) ── */
        .vl-btn {
            padding: 10px 36px;
            background: #085c40;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.15s;
        }

            .vl-btn:hover:not(:disabled) {
                background: #064d35;
            }

            .vl-btn:disabled {
                background: #b3dcc9;
                cursor: not-allowed;
            }

        /* ── SECONDARY / BACK BUTTON ── */
        .vl-btn-secondary {
            padding: 10px 36px;
            background: #fff;
            color: #374151;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.15s, border-color 0.15s;
        }

            .vl-btn-secondary:hover {
                background: #f3f4f6;
                border-color: #9ca3af;
            }

        /* loading spinner on primary btn */
        .vl-btn.loading {
            position: relative;
            color: transparent;
        }

            .vl-btn.loading::after {
                content: '';
                position: absolute;
                width: 14px;
                height: 14px;
                top: 50%;
                left: 50%;
                margin: -7px 0 0 -7px;
                border: 2px solid rgba(255,255,255,0.3);
                border-top-color: #fff;
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
            }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── RESPONSIVE: single column on small screens ── */
        @media (max-width: 480px) {
            .vl-card {
                padding: 28px 18px;
            }

            .vl-grid {
                grid-template-columns: 1fr;
            }

            .vl-btn,
            .vl-btn-secondary {
                padding: 10px 22px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>

<body>

    <!-- Brand (same as File 1) -->
    <div class="vl-brand">
        <div class="vl-logo">
            <img src="../assets/Images/logo.jpeg" alt="RM CMS Logo"
                 onerror="this.style.display='none';this.parentElement.textContent='R'">
        </div>
        <span class="vl-brand-name">RM </span> <span class="vl-brand-name " style="color: #085c40"> CMS </span>
    </div>

    <!-- Card -->
    <div class="vl-card">

        <!-- Back link -->
        <a href="Login.html" class="vl-back">← Back to Login</a>

        <!-- Header (same structure as File 1) -->
        <p class="vl-eyebrow">Volunteer Portal</p>
        <h1 class="vl-heading">Create Account</h1>
        <p class="vl-sub">Join our volunteer community. Sign up to get started.</p>
        <div class="vl-divider"></div>

        <!-- Messages -->
        <div id="errorMessage" class="alert-message alert-error" style="display:none;"></div>
        <div id="successMessage" class="alert-message alert-success" style="display:none;"></div>

        <!-- Form — 2-column grid -->
        <form id="signupForm">
            <div class="vl-grid">

                <!-- Row 1: First Name | Last Name -->
                <div>
                    <label class="vl-label" for="firstName">First Name *</label>
                    <input type="text" id="firstName" class="vl-input" placeholder="First name" required>
                </div>
                <div>
                    <label class="vl-label" for="lastName">Last Name *</label>
                    <input type="text" id="lastName" class="vl-input" placeholder="Last name" required>
                </div>

                <!-- Row 2: Email | Mobile -->
                <div>
                    <label class="vl-label" for="email">Email *</label>
                    <input type="email" id="email" class="vl-input" placeholder="your@email.com" required>
                </div>
                <div>
                    <label class="vl-label" for="phone">Mobile Number *</label>
                    <input type="tel" id="phone" class="vl-input" placeholder="10-digit number"
                           maxlength="10" inputmode="numeric" required>
                </div>

                <!-- Row 3: Team Lead ID | Capacity Band -->
                <div>
                    <label class="vl-label" for="teamLead">Team Lead</label>
                    <!--<input type="text" id="teamLead" class="vl-input" placeholder="Lead's ID (if known)">-->

                    <select id="teamLead" class="vl-input">
                        <option value="">Select TeamLead</option>
                      
                    </select>

                </div>
                <div>
                    <label class="vl-label" for="capacityBand">Capacity Band</label>
                    <select id="capacityBand" class="vl-input">
                        <option value="">Select Capacity</option>
                        <option value="Consistent">Consistent (4-6)</option>
                        <option value="Balanced">Balanced (2-3)</option>
                        <option value="Limited">Limited (1-2)</option>
                    </select>
                </div>

            </div><!-- /vl-grid -->
            <!-- Buttons -->
            <div class="vl-btn-wrap">
                <button type="button" id="backBtn" class="vl-btn-secondary">Back</button>
                <button type="submit" id="submitBtn" class="vl-btn">Save</button>
            </div>

        </form>
    </div><!-- /vl-card -->
    <!-- Scripts -->
    <script src="../assets/js/volunteers.js"></script>
    <script>
        $(document).ready(function () {

            restrictMobileInput('phone');

            $('#backBtn').on('click', function () {
                window.location.href = 'Login.html';
            });

            $('#signupForm').on('submit', function (e) {
                e.preventDefault();

                const errorMsg = $('#errorMessage');
                const successMsg = $('#successMessage');

                errorMsg.hide().text('');
                successMsg.hide().text('');

                const payload = {
                    VolunteerId: "",
                    firstName: $("#firstName").val().trim(),
                    lastName: $("#lastName").val().trim(),
                    email: $("#email").val().trim(),
                    phone: $("#phone").val().trim(),
                    teamLead: $("#teamLead").val().trim(),
                    capacityBand: $("#capacityBand").val()
                };

                if (!payload.firstName || !payload.lastName || !payload.email) {
                    errorMsg.text("First Name, Last Name, and Email are required.").show();
                    return;
                }

                if (payload.phone && !isValidMobileNumber(payload.phone)) {
                    errorMsg.text("Phone number must be exactly 10 digits.").show();
                    return;
                }

                const btn = $('#submitBtn');
                btn.addClass('loading').prop('disabled', true);

                $.ajax({
                    url: API_BASE_URL + "/volunteers",
                    method: "POST",
                    contentType: "application/json",
                    data: JSON.stringify(payload),

                    success: function () {
                        btn.removeClass('loading').prop('disabled', false);
                        successMsg.text("Account created successfully! Redirecting to login...").show();
                        setTimeout(() => { window.location.href = 'Login.html'; }, 2000);
                    },

                    error: function (xhr) {
                        btn.removeClass('loading').prop('disabled', false);
                        let msg = "Something went wrong.";
                        if (xhr.responseJSON && xhr.responseJSON.message) {
                            msg = xhr.responseJSON.message;
                        }
                        errorMsg.text(msg).show();
                    }
                });
            });
        });
    </script>

</body>
</html>
