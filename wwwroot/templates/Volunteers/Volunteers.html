<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Volunteer - RM CMS</title>
    <link rel="icon" href="../assets/Images/favicon.ico">
    <link rel="icon" type="image/png" href="../assets/Images/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="../assets/js/api-config.js"></script>
    <script src="../assets/js/utils.js"></script>

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f5f7f6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            margin: 0;
        }

        /* ── BRAND ── */
        .vl-brand {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 1.5rem;
        }

        .vl-logo {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: #e6f4ef;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #085c40;
            font-size: 1.1rem;
            overflow: hidden;
        }

            .vl-logo img {
                width: 34px;
                height: 34px;
                object-fit: contain;
            }

        .vl-brand-name {
            font-size: 1rem;
            font-weight: 700;
            color: #111827;
        }

        /* ── CARD ── */
        .vl-card {
            background: #fff;
            border-radius: 14px;
            border: 1px solid #e5e7eb;
            padding: 32px 28px;
            width: 100%;
            max-width: 540px;
        }

        /* ── EYEBROW / HEADING / SUB ── */
        .vl-eyebrow {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #085c40;
            margin: 0 0 6px;
        }

        .vl-heading {
            font-size: 1.5rem;
            font-weight: 700;
            color: #111827;
            margin: 0 0 6px;
            letter-spacing: -0.03em;
        }

        .vl-sub {
            font-size: 0.83rem;
            color: #6b7280;
            margin: 0 0 20px;
        }

        .vl-divider {
            height: 1px;
            background: #e5e7eb;
            margin-bottom: 20px;
        }

        /* ── BACK LINK ── */
        .vl-back {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #085c40;
            text-decoration: none;
            margin-bottom: 18px;
        }

            .vl-back:hover {
                text-decoration: underline;
                color: #064d35;
            }

        /* ── 2-COLUMN FORM GRID ── */
        .vl-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0 16px;
        }

            .vl-grid .vl-full {
                grid-column: 1 / -1;
            }

        /* ── LABEL ── */
        .vl-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #374151;
            margin: 0 0 6px;
            display: block;
        }

        /* ── INPUT ── */
        .vl-input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #111827;
            outline: none;
            margin-bottom: 20px;
            font-family: inherit;
            background: #fff;
            transition: border-color 0.15s;
        }

            .vl-input:focus {
                border-color: #085c40;
                box-shadow: 0 0 0 3px rgba(8, 92, 64, 0.08);
            }

            .vl-input::placeholder {
                color: #9ca3af;
            }

        /* ── MESSAGES ── */
        .alert-message {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.82rem;
            margin-bottom: 14px;
            border-left: 3px solid;
        }

        .alert-error {
            background: #fef5f5;
            border-left-color: #ef4444;
            color: #991b1b;
        }

        .alert-success {
            background: #f0fdf4;
            border-left-color: #22c55e;
            color: #166534;
        }

        /* ── BUTTON WRAP ── */
        .vl-btn-wrap {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 18px;
            margin-top: 4px;
        }

        /* ── PRIMARY BUTTON ── */
        .vl-btn {
            padding: 10px 36px;
            background: #085c40;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.15s;
        }

            .vl-btn:hover:not(:disabled) {
                background: #064d35;
            }

            .vl-btn:disabled {
                background: #b3dcc9;
                cursor: not-allowed;
            }

        /* ── SECONDARY BUTTON ── */
        .vl-btn-secondary {
            padding: 10px 36px;
            background: #fff;
            color: #374151;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.15s, border-color 0.15s;
        }

            .vl-btn-secondary:hover {
                background: #f3f4f6;
                border-color: #9ca3af;
            }

        /* loading spinner on primary btn */
        .vl-btn.loading {
            position: relative;
            color: transparent;
        }

            .vl-btn.loading::after {
                content: '';
                position: absolute;
                width: 14px;
                height: 14px;
                top: 50%;
                left: 50%;
                margin: -7px 0 0 -7px;
                border: 2px solid rgba(255,255,255,0.3);
                border-top-color: #fff;
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
            }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 480px) {
            .vl-card {
                padding: 28px 18px;
            }

            .vl-grid {
                grid-template-columns: 1fr;
            }

            .vl-btn,
            .vl-btn-secondary {
                padding: 10px 22px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>

<body>

    <!-- Brand -->
    <div class="vl-brand">
        <div class="vl-logo">
            <img src="../assets/Images/logo.jpeg" alt="RM CMS Logo"
                 onerror="this.style.display='none';this.parentElement.textContent='R'">
        </div>
        <span class="vl-brand-name">RM </span>
        <span class="vl-brand-name" style="color: #085c40"> CMS </span>
    </div>

    <!-- Card -->
    <div class="vl-card">

       

        <!-- Header -->
        <p class="vl-eyebrow">Volunteer Portal</p>
        <h1 class="vl-heading">Create Account</h1>
        <p class="vl-sub">Join our volunteer community. Sign up to get started.</p>
        <div class="vl-divider"></div>

        <!-- Messages -->
        <div id="errorMessage" class="alert-message alert-error" style="display:none;"></div>
        <div id="successMessage" class="alert-message alert-success" style="display:none;"></div>

        <!-- Form -->
        <form id="signupForm">
            <div class="vl-grid">

                <!-- Row 1: First Name | Last Name -->
                <div>
                    <label class="vl-label" for="firstName">First Name *</label>
                    <input type="text" id="firstName" class="vl-input" placeholder="First name" required>
                </div>
                <div>
                    <label class="vl-label" for="lastName">Last Name *</label>
                    <input type="text" id="lastName" class="vl-input" placeholder="Last name" required>
                </div>

                <!-- Row 2: Email | Mobile -->
                <div>
                    <label class="vl-label" for="email">Email *</label>
                    <input type="email" id="email" class="vl-input" placeholder="your@email.com" required>
                </div>
                <div>
                    <label class="vl-label" for="phone">Mobile Number *</label>
                    <input type="tel" id="phone" class="vl-input" placeholder="10-digit number"
                           maxlength="10" inputmode="numeric" required>
                </div>

                <!-- Row 3: Team Lead | Capacity Band -->
                <div>
                    <label class="vl-label" for="teamLead">Team Lead</label>
                    <select id="teamLead" class="vl-input">
                        <option value="">Select TeamLead</option>
                    </select>
                </div>
                <div>
                    <label class="vl-label" for="capacityBand">Capacity Band</label>
                    <select id="capacityBand" class="vl-input">
                        <option value="">Select Capacity</option>
                        <option value="Consistent">Consistent (4-6)</option>
                        <option value="Balanced">Balanced (2-3)</option>
                        <option value="Limited">Limited (1-2)</option>
                    </select>
                </div>

                <!-- Telegram Chat ID (full width) -->
                <div class="vl-full">
                    <div style="
                        border:1px solid #d1d5db;
                        border-radius:10px;
                        padding:16px;
                        background:#f9fafb;
                        margin-bottom:20px;
                    ">
                        <!-- Header -->
                        <div style="margin-bottom:14px;">
                            <label class="vl-label" style="margin-bottom:2px;">Telegram Number</label>
                            <div style="font-size:0.8rem; color:#6b7280;">
                                Open the bot and click Start before fetching Number
                            </div>
                        </div>

                        <!-- Input + Button -->
                        <div style="display:flex; gap:12px; align-items:center; margin-bottom:14px;">
                            <div style="flex:1;">
                                <input type="text"
                                       id="telegramChatId"
                                       class="vl-input"
                                       placeholder="Telegram Number"
                                       style="margin-bottom:0;" />
                            </div>
                            <button type="button" id="getChatBtn" class="vl-btn"
                                    style="padding:10px 20px; white-space:nowrap;">
                                Get Number
                            </button>
                        </div>

                        <!-- Chat Name -->
                        <div id="chatName" style="margin-top:12px; font-size:0.9rem; color:#374151;"></div>

                        <!-- Bottom Actions -->
                        <div style="
                            display:flex;
                            align-items:center;
                            gap:10px;
                            border-top:1px solid #e5e7eb;
                            padding-top:12px;
                        ">
                            <!-- Copy Icon -->
                            <button type="button" id="copyBotUrlBtn"
                                    style="border:none; background:none; cursor:pointer; padding:0;
                                           display:flex; align-items:center; justify-content:center;"
                                    title="Copy Bot URL">
                                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22"
                                     fill="none" viewBox="0 0 24 24" stroke="#085c40" stroke-width="2">
                                    <rect x="9" y="9" width="13" height="13" rx="2"></rect>
                                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                                </svg>
                                <span style="color:#085c40; font-size:0.95rem; font-weight:600;
                                             text-decoration:none; display:flex; align-items:center; gap:6px;">
                                    Copy |
                                </span>
                            </button>

                            <!-- Open Bot -->
                            <a id="tel_boot_url" href="https://t.me/YourBotName" target="_blank"
                               style="color:#085c40; font-size:0.95rem; font-weight:600;
                                      text-decoration:none; display:flex; align-items:center; gap:6px;">
                                Open Telegram Bot ↗
                            </a>
                        </div>

                        <!-- Hidden URL -->
                        <input type="hidden" id="telegramBotUrl" value="https://t.me/YourBotName" />
                    </div>
                </div>

            </div><!-- /vl-grid -->
            <!-- Buttons -->
            <div class="vl-btn-wrap">
                <!--<button  type="button" id="backBtn" class="vl-btn-secondary d-none">Back</button>-->
                <button type="submit" id="submitBtn" class="vl-btn">Save</button>
            </div>

        </form>
    </div><!-- /vl-card -->
    <!-- External JS (no inline scripts) -->
    <script src="../assets/js/volunteers.js"></script>

</body>
</html>
