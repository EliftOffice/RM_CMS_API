<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Assignments - RM_CMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="../assets/js/api-config.js"></script>
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/volunteers.js"></script>
    <style>
        body { background-color: #f8f9fa; }
        .card { margin-top: 30px; border-radius: 8px; }
        .table td, .table th { vertical-align: middle; }
    </style>
</head>
<body>
<div class="container">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Your Assignments</h5>
                    <div>
                        <span class="me-2">Volunteer:</span>
                        <strong id="volunteerIdDisplay">-</strong>
                    </div>
                </div>
                <div class="card-body">
                    <div id="responseContainer"></div>
                    <table class="table table-striped" id="assignmentsTable">
                        <thead>
                        <tr>
                            <th>Person ID</th>
                            <th>Name</th>
                            <th>Phone</th>
                            <th>Email</th>
                            <th>Campus</th>
                            <th>Next Action Date</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                        </thead>
                        <tbody>
                        <!-- rows populated by JS -->
                        </tbody>
                    </table>
                    <div class="text-muted">Tip: Pass your volunteer id in the query string, e.g. ?volunteerId=V001</div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Follow-up Modal -->
<div class="modal fade" id="followUpModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Log Follow-up Attempt</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="followUpForm">
                    <input type="hidden" id="person_id">
                    <input type="hidden" id="volunteer_id">
                    <div class="mb-3">
                        <label class="form-label">Contact Method</label>
                        <select id="contact_method" class="form-select">
                            <option>Phone Call</option>
                            <option>Text Message</option>
                            <option>Email</option>
                            <option>In-Person</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contact Status</label>
                        <select id="contact_status" class="form-select">
                            <option value="Contacted">Contacted</option>
                            <option value="Not Contacted">Not Contacted</option>
                            <!--<option value="Unresponsive">Unresponsive</option>-->
                        </select>
                    </div>
                    <div class="mb-3" id="responseTypeGroup">
                        <label class="form-label">Response Type</label>
                        <select id="response_type" class="form-select">
                            <option>Normal</option>
                            <option>Needs Follow-Up</option>
                            <option>Crisis</option>
                            <option>No Response</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Call Duration (min)</label>
                        <input type="number" id="call_duration_min" class="form-control" min="0">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Notes</label>
                        <textarea id="notes" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Tags (comma separated)</label>
                        <input type="text" id="tags" class="form-control">
                    </div>
                </form>
                <div id="modalResponse" class="mt-2"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" id="saveFollowUp" class="btn btn-primary">Save Follow-up</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
